<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FISAM - Aggiorna Codice</title>
<style>
body{background:#111;color:#fff;font-family:Arial;padding:20px;max-width:800px;margin:0 auto}
.section{margin-bottom:30px;border:2px solid #F5A623;border-radius:8px;padding:20px}
h1{color:#F5A623;text-align:center}
h2{color:#F5A623;margin-top:0}
.btn{background:#F5A623;color:#000;border:none;padding:15px 40px;font-size:18px;font-weight:bold;border-radius:8px;cursor:pointer;display:block;margin:10px auto}
.btn:hover{background:#E0961F}
.ok{color:#4ade80;text-align:center;font-weight:bold;margin-top:10px}
a{color:#F5A623}
.step{background:#1a1a1a;padding:12px;border-radius:6px;margin:10px 0;line-height:1.8}
</style>
</head>
<body>
<h1>FISAM Academy - Aggiorna Codice</h1>

<div class="section">
<h2>FILE 1: LoginPage.js</h2>
<div class="step">
1. Clicca <b>COPIA</b><br>
2. Apri <a href="https://github.com/wq6bvjj9fj-lab/Fisam-Academy-app-1/edit/main/frontend/src/pages/LoginPage.js" target="_blank">LoginPage.js su GitHub (clicca qui)</a><br>
3. Ctrl+A &rarr; Cancella &rarr; Ctrl+V &rarr; Commit changes
</div>
<button class="btn" id="btn1">COPIA LOGINPAGE.JS</button>
<div id="s1"></div>
</div>

<div class="section">
<h2>FILE 2: Layout.js</h2>
<div class="step">
1. Clicca <b>COPIA</b><br>
2. Apri <a href="https://github.com/wq6bvjj9fj-lab/Fisam-Academy-app-1/edit/main/frontend/src/components/Layout.js" target="_blank">Layout.js su GitHub (clicca qui)</a><br>
3. Ctrl+A &rarr; Cancella &rarr; Ctrl+V &rarr; Commit changes
</div>
<button class="btn" id="btn2">COPIA LAYOUT.JS</button>
<div id="s2"></div>
</div>

<script>
const files = {
  btn1: {url: '/code-files/LoginPage.js.txt', status: 's1'},
  btn2: {url: '/code-files/Layout.js.txt', status: 's2'}
};

Object.keys(files).forEach(btnId => {
  document.getElementById(btnId).addEventListener('click', async () => {
    try {
      const resp = await fetch(files[btnId].url);
      const code = await resp.text();
      await navigator.clipboard.writeText(code);
      document.getElementById(files[btnId].status).innerHTML = '<div class="ok">COPIATO! Ora incolla su GitHub</div>';
    } catch(e) {
      const resp = await fetch(files[btnId].url);
      const code = await resp.text();
      const t = document.createElement('textarea');
      t.value = code;
      t.style.position = 'fixed';
      t.style.left = '-9999px';
      document.body.appendChild(t);
      t.select();
      document.execCommand('copy');
      document.body.removeChild(t);
      document.getElementById(files[btnId].status).innerHTML = '<div class="ok">COPIATO! Ora incolla su GitHub</div>';
    }
  });
});
</script>
</body>
</html>
